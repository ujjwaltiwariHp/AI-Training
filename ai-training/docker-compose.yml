services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  day0-foundation:
    build:
      context: .
      dockerfile: apps/day0-foundation/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - apps/day0-foundation/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
    restart: always

volumes:
  redis_data:
